name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Dependency-free structural gate: every manifest must be valid JSON with
      # its required fields. jq is preinstalled on the runner, so this always runs
      # even if the CLI install below ever changes.
      - name: Structural check (jq)
        run: |
          set -euo pipefail
          jq -e '.name and .owner.name and (.plugins | length > 0)' \
            .claude-plugin/marketplace.json > /dev/null
          for p in plugins/*/.claude-plugin/plugin.json; do
            jq -e '.name' "$p" > /dev/null || { echo "invalid manifest: $p"; exit 1; }
          done
          echo "structural check: ok"

      # Full semantic validation. `claude plugin validate` is a local static check
      # (no API key / no auth required); --strict fails on warnings too.
      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: claude plugin validate --strict
        run: claude plugin validate . --strict
